name: Release

on:
  push:
    tags:
    - v*
  workflow_dispatch:  # manual validation build (publish stays gated on a tag push)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  wheels:
    name: wheels - ${{ matrix.os }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        # Native runners (no QEMU). arm64-linux and Intel-macOS have no "-latest"
        # alias, so those two stay version-pinned.
        os: [linux-intel, linux-arm, macos-arm, macos-intel, windows]
        include:
        - os: linux-intel
          runs-on: ubuntu-latest
        - os: linux-arm
          runs-on: ubuntu-24.04-arm
        - os: macos-arm
          runs-on: macos-latest
        - os: macos-intel
          runs-on: macos-15-intel
        - os: windows
          runs-on: windows-latest
    steps:
    - uses: actions/checkout@v7
      with:
        submodules: recursive  # the EPA SWMM engine source lives in a submodule
        fetch-depth: 0
    - uses: pypa/cibuildwheel@v4.1
      env:
        CIBW_ARCHS: native
        CIBW_BUILD_VERBOSITY: 1
    - uses: actions/upload-artifact@v7
      with:
        name: wheels-${{ matrix.os }}
        path: wheelhouse/*.whl

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
      with:
        submodules: recursive
        fetch-depth: 0
    - uses: astral-sh/setup-uv@v8.2.0
    - run: uv build --sdist
    - uses: actions/upload-artifact@v7
      with:
        name: sdist
        path: dist/*.tar.gz

  release-notes:
    name: Create release notes
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write  # create the GitHub Release
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
    - name: Generate release notes with git-cliff
      uses: orhun/git-cliff-action@v4
      with:
        config: pyproject.toml
        args: --latest --strip all
      env:
        OUTPUT: release-notes.md
        GITHUB_REPO: ${{ github.repository }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v3
      with:
        body_path: release-notes.md
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to PyPI
    needs: [wheels, sdist]  # only publish once every wheel + the sdist are built
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # PyPI trusted publishing
    steps:
    - uses: actions/download-artifact@v8
      with:
        path: dist
        merge-multiple: true
    - uses: astral-sh/setup-uv@v8.2.0
    - run: uv publish  # OIDC trusted publishing (no token; needs id-token: write)
